# Prefix を Ctrl-f に変更
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# 番号を 1 始まりにする
set -g base-index 1
setw -g pane-base-index 1

# マウス操作
set -g mouse on

# macOS クリップボード連携
set -g set-clipboard on
set -s copy-command "pbcopy"

# copy-mode を vi 風にする
setw -g mode-keys vi
# copy-mode の選択開始/コピーを vi 風キーバインドで macOS クリップボードに送る
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Alt-o でペインのズーム切り替え
bind -n M-o resize-pane -Z

# Alt-h/j/k/l でペイン移動
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt-\ で縦分割、Alt-- で横分割
# JIS 配列では "\" キーが "¥" として届く場合があるため両方に対応
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-¥ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# tmux-prefix-highlightの設定
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'cyan'

# copyモードに入った時に"Copy"という文字を表示
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_prompt 'Copy'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=green'

# syncモードに入った時に"Sync"という文字を表示
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_prompt 'Sync'
set -g @prefix_highlight_sync_mode_attr 'fg=black,bg=green'

# 256色端末を使用する
set -g default-terminal "screen-256color"

# status line を更新する間隔を 1 秒にする
set-option -g status-interval 1

# window-status を中央揃えで配置する
set-option -g status-justify "centre"
set -g status-position top

# status line の背景色を指定する。
set-option -g status-bg "colour238"

# status line の文字色を指定する。
set-option -g status-fg "colour255"

# status-left の最大の長さを指定する。
set-option -g status-left-length 20

# status-left のフォーマットを指定する。
set-option -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default]"

# status-right の最大の長さを指定する。
set-option -g status-right-length 60

# status-right のフォーマットを指定する。
set-option -g status-right "#{prefix_highlight} %m/%d %H:%M:%S#[default]"

# window-status のフォーマットを指定する。
set-window-option -g window-status-format " #I: #W "

# カレントウィンドウの window-status のフォーマットを指定する
set-window-option -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W #[default]"

# ---- Plugins (TPM) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
